# -----------------------------------------------------------
# Paths
# -----------------------------------------------------------
paths:
  data_dir: "data"
  artifacts_dir: "artifacts"
  models_dir: "artifacts/models"
  metrics_dir: "artifacts/metrics"
  submissions_dir: "artifacts/submissions"
  analysis_dir: "artifacts/analysis"
  experiments_dir: "artifacts/experiments"
  logs_dir: "artifacts/logs"
  plots_dir: "artifacts/plots"

  train_file: "data/train.csv"
  test_file: "data/test.csv"
  sample_submission_file: "data/sample_submission.csv"

  best_model_file: "artifacts/models/best_model.joblib"

# -----------------------------------------------------------
# Preprocessing
# -----------------------------------------------------------
preprocessing:
  normalize_unicode: true
  strip_whitespace: true
  remove_repeated_spaces: true
  lowercase: false          # Keep False: capitalisation is a stylistic signal
  remove_punctuation: false # Keep False: punctuation is discriminative
  remove_numbers: false     # Keep False: numeric patterns can distinguish sources

# -----------------------------------------------------------
# Feature Engineering
# -----------------------------------------------------------
features:
  # Word-level TF-IDF — reduced from 100k to 50k to fight generalization gap
  word_tfidf:
    ngram_range: [1, 2]
    max_features: 50000
    min_df: 3              # raised from 2: remove hapax words that don't generalise
    max_df: 0.95
    sublinear_tf: true
    analyzer: "word"

  # Character-level TF-IDF — min_df lowered to 2 to expose rare but class-specific char patterns
  char_tfidf:
    ngram_range: [2, 6]
    max_features: 50000
    min_df: 2              # lowered from 4: rare char n-grams can distinguish DeepSeek/Grok
    max_df: 0.95
    sublinear_tf: true
    analyzer: "char_wb"

  # Micro char TF-IDF — NEW Run 11: analyzer=char (no word-boundary padding), range (3,7)
  # Captures micro punctuation/spacing patterns: ". " transitions, "The " start, comma density
  # Complements char_wb(2,6) which word-pads; char(3,7) crosses word boundaries
  char_tfidf_micro:
    enabled: true
    ngram_range: [3, 7]
    max_features: 20000
    min_df: 2
    max_df: 0.95
    sublinear_tf: true
    analyzer: "char"

  # Stylometric hand-crafted features (45 features)
  stylometric:
    enabled: true

  # Function-word TF-IDF — style fingerprint, not topic
  # Uses n-grams of ~150 function words (determiners, conjunctions, auxiliaries,
  # pronouns, discourse markers). Bigrams like "however , the" capture transition
  # patterns that unigrams miss.
  function_word_tfidf:
    enabled: true
    sublinear_tf: true
    ngram_range: [1, 3]
    max_features: 5000
    min_df: 2

  # DS/Grok subspace TF-IDF — trained ONLY on DeepSeek+Grok samples (~240)
  # Creates a topic-neutral vocabulary tuned to the DS/Grok decision boundary.
  # Zero activations for Human/Claude/Gemini/ChatGPT texts are intentional.
  ds_grok_tfidf:
    enabled: true
    ngram_range: [1, 3]
    max_features: 10000
    min_df: 1

  # Delexicalized word TF-IDF — digit sequences replaced with __NUM__
  # Reduces topic leakage from specific numbers/years; __NUM__ token itself
  # encodes "number density" which differs between DS and Grok factual texts.
  delex_tfidf:
    enabled: true
    ngram_range: [1, 2]
    max_features: 30000
    min_df: 2

# -----------------------------------------------------------
# Cross-Validation
# -----------------------------------------------------------
validation:
  n_splits: 5
  random_state: 42
  shuffle: true

# -----------------------------------------------------------
# Learning Curves
# -----------------------------------------------------------
learning_curve:
  enabled: false
  n_points: 6

